apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        fsGroup: 1000 # Yeh storage volume ki ownership set karta hai
      initContainers:
        - name: fix-permissions
          image: busybox
          command: [ "sh", "-c", "chmod -R 777 /data" ]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jaeger-storage
              mountPath: /data
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        env:
          - name: COLLECTOR_OTLP_ENABLED
            value: "true"
          - name: SPAN_STORAGE_TYPE
            value: "badger" # Local storage engine
          - name: BADGER_DIRECTORY_VALUE
            value: "/data/spans" # Data yahan save hoga
          - name: BADGER_DIRECTORY_KEY
            value: "/data/keys"
          - name: BADGER_EPHEMERAL
            value: "false" # Restart par data nahi uray ga
        securityContext:
          runAsUser: 1000
          allowPrivilegeEscalation: false
        ports:
          - containerPort: 16686 # UI
          - containerPort: 4317  # OTLP gRPC
          - containerPort: 4318  # OTLP HTTP
        volumeMounts:
        - name: jaeger-storage
          mountPath: /data # PVC ko yahan mount kiya
      volumes:
      - name: jaeger-storage
        persistentVolumeClaim:
          claimName: jaeger-pvc